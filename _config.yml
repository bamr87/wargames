# =============================================================================
# Zer0-Mistakes Remote Theme Configuration
# =============================================================================
# This is a minimal _config.yml for GitHub Pages sites that load the
# zer0-mistakes theme remotely. No local theme files are needed — layouts,
# includes, assets, and styles are all pulled from the remote theme repo.
#
# Theme: https://github.com/bamr87/zer0-mistakes
# Docs:  https://bamr87.github.io/wargames/docs/
# =============================================================================

# ── Setup Flag ────────────────────────────────────────────────────────────────
# Set to true once you've personalised the fields below.
# While false (or absent), the theme shows a setup guide on the 404 page.
site_configured          : true

# ── Site Identity ─────────────────────────────────────────────────────────────
title                    : "Wargames"
subtitle                 : "OverTheWire security challenges"
description              : "Curated OverTheWire security wargames — learn Linux, CTF, and cybersecurity through hands-on challenges."
founder                  : "bamr87"
email                    : ""

# ── GitHub ────────────────────────────────────────────────────────────────────
github_user              : &github_user "bamr87"
repository_name          : &github_repository "wargames"

# ── URLs & Deployment ─────────────────────────────────────────────────────────
#
#   Scenario A — User/Org site  (<user>.github.io repo):
#     url:     "https://<user>.github.io"
#     baseurl: ""
#
#   Scenario B — Project site   (any other repo name):
#     url:     "https://<user>.github.io"
#     baseurl: "/repo-name"
#
#   Scenario C — Custom domain:
#     url:     "https://yourdomain.com"
#     baseurl: ""
#
url                      : "https://bamr87.github.io"
baseurl                  : "/wargames"
remote_theme             : "bamr87/zer0-mistakes"
permalink                : /:categories/:title/

# ── Build Settings ────────────────────────────────────────────────────────────
markdown                 : kramdown
highlighter              : rouge
pages_dir                : pages

# ── Collections ───────────────────────────────────────────────────────────────
collections:
  posts:
    output               : true
    permalink            : /posts/:title/
  docs:
    output               : true
    permalink            : /docs/:path/
  about:
    output               : true
    permalink            : /about/:path/

# ── Default Front Matter ─────────────────────────────────────────────────────
# Wargames content is plain Markdown at the repo root (index.md) and under
# overthewire/** — not a Jekyll collection — so every page is type "pages".
# The catch-all below gives them the theme's docs layout; the overthewire scope
# adds the games sidebar (_data/navigation/wargames.yml). The homepage
# (index.md) overrides these with `layout: home` in its own front matter.
defaults:
  - scope:
      path               : ""
      type               : "pages"
    values:
      layout             : "default"
  - scope:
      path               : "overthewire"
    values:
      layout             : "default"
      sidebar:
        nav              : wargames

# ── Plugins ───────────────────────────────────────────────────────────────────
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag
  - jekyll-include-cache
  - jekyll-remote-theme

# ── Exclude from Build ────────────────────────────────────────────────────────
# Keep tooling, docs, and installer artifacts out of the generated site.
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - LICENSE
  - CLAUDE.md
  - AGENTS.md
  - zer0.install.yml
  - scripts/
  - tools/
  - node_modules/
  - vendor/
  - "*.backup.*"
